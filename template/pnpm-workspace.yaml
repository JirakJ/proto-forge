packages:
  - "packages/*"

# handlebars <4.7.9 carries the 2026 JS-injection advisory batch (GHSA-2w6w-674q-4c4q
# et al.), pulled dev-only via eslint-plugin-boundaries@5 → @boundaries/elements.
# Drop when eslint-plugin-boundaries is bumped to ≥7 (pins 4.7.9 itself).
# brace-expansion <1.1.16 / <2.1.2 = ReDoS (GHSA-3jxr-9vmj-r5cp); transitive.
# dompurify <3.4.12 = LOW (GHSA-c2j3-45gr-mqc4); direct via SafeHtml.
overrides:
  handlebars: ^4.7.9
  brace-expansion@1: ^1.1.16
  brace-expansion@2: ^2.1.2
  dompurify: ^3.4.12
