name: verify

# The gates are the interface (BRS §17.3): CI is a thin wrapper that runs the
# same `pnpm verify` you run locally. Porting to any runner = re-expressing these
# four steps. If `pnpm verify` is green locally, it is green here.
on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      # gitleaks is an external binary; install a pinned build so sec:scan enforces it.
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - run: pnpm verify
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: proto-forge-artifacts
          path: |
            .proto-forge/snapshot.json
            .proto-forge/sbom.cdx.json
          if-no-files-found: ignore
